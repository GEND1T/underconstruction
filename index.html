<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krupuk Mie T-Be - Under Construction</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- RESET & VARIABLES --- */
        :root {
            --primary: #f59e0b; 
            --primary-hover: #d97706;
            --secondary: #eab308; 
            --text-dark: #1f2937;
            --text-light: #4b5563;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body, html {
            height: 100%;
            background-color: #ffffff;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        /* --- HEADER & NAVBAR --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            position: relative;
            z-index: 20;
            background-color: #ffffff;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 1.3rem;
            color: #000;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: url('asset/WEBSITE\ UNDERCONSTRUCTION\ \(3\).png') center/cover; 
        }

        /* Desktop Nav */
        nav ul {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-weight: 500;
            font-size: 1rem;
            position: relative;
            padding-bottom: 5px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--primary);
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 50%;
            background-color: #000;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        nav a.active::after {
            width: 100%;
        }
        
        nav a:hover::after {
            width: 100%;
            background-color: var(--primary);
        }

        /* Hamburger Menu Icon (Hidden on Desktop) */
        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 21px;
            cursor: pointer;
            z-index: 21;
        }

        .hamburger span {
            display: block;
            height: 3px;
            width: 100%;
            background-color: var(--text-dark);
            border-radius: 3px;
            transition: all 0.3s ease-in-out;
        }

        /* --- HERO SECTION --- */
        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            padding: 0 5%;
            position: relative;
            z-index: 5;
        }

        .content {
            max-width: 600px;
            padding-bottom: 4rem; 
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.2rem;
            color: #111827;
        }

        .subtitle {
            color: var(--secondary);
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 5px;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            border-right: 2px solid var(--secondary);
            display: inline-block;
            padding-right: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { border-color: transparent; }
            50% { border-color: var(--secondary); }
        }

        p {
            color: var(--text-light);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            max-width: 90%;
        }

        .cta-button {
            display: inline-block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 8px 15px rgba(245, 158, 11, 0.2);
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(245, 158, 11, 0.3);
        }

        /* --- BACKGROUND ASSET --- */
        .image-container {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 55%; 
            max-width: 850px;
            z-index: -1; 
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            object-position: bottom right; 
        }

        /* --- RESPONSIVE MOBILE & HAMBURGER MENU --- */
        @media (max-width: 992px) {
            header {
                padding: 1.5rem 5%;
            }

            /* Tampilkan Icon Hamburger */
            .hamburger {
                display: flex;
            }

            /* Sembunyikan Navigasi Default, Jadikan Dropdown Overlay */
            nav {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background-color: #ffffff;
                padding: 0;
                box-shadow: 0 10px 15px rgba(0,0,0,0.05);
                clip-path: circle(0% at top right); /* Efek sembunyi */
                transition: all 0.4s ease-in-out;
            }

            /* Saat menu dibuka (class .show ditambahkan via JS) */
            nav.show {
                clip-path: circle(150% at top right);
                padding: 2rem 0;
            }

            nav ul {
                flex-direction: column;
                align-items: center;
                gap: 2rem;
            }

            /* Animasi Hamburger menjadi 'X' */
            .hamburger.active span:nth-child(1) {
                transform: translateY(9px) rotate(45deg);
            }
            .hamburger.active span:nth-child(2) {
                opacity: 0;
            }
            .hamburger.active span:nth-child(3) {
                transform: translateY(-9px) rotate(-45deg);
            }

            /* Penyesuaian Layout Main di Mobile */
            main {
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                padding-top: 2rem;
            }

            .content {
                max-width: 100%;
                padding-bottom: 2rem;
            }

            p {
                margin: 0 auto 2rem auto;
            }

            .image-container {
                position: relative;
                width: 100%;
                max-width: 500px;
                opacity: 0.9;
            }
        }

        @media (max-width: 576px) {
            h1 { font-size: 1.8rem; }
            .subtitle { font-size: 1.1rem; letter-spacing: 3px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="logo-container">
                <div class="logo-icon"></div>
                <span>Krupuk Mie T-Be</span>
            </div>
            
            <!-- Ikon Hamburger -->
            <div class="hamburger" id="hamburger-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <!-- Navbar -->
            <nav id="navbar">
                <ul>
                    <li><a href="#" class="active">Home</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Contact Us</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="content">
                <h1>WEBSITE KERUPUK MIE T-BE</h1>
                <div class="subtitle" id="typed-text"></div>
                
                <p>Nikmati Krupuk Mie renyah dan gurih, sedang dalam proses peluncuran. Kami penyempurnaan renyah dan gurih, sedang dalam proses peluncuran. Kami mempersiapkan cita rasa terbaik untuk Anda!</p>
                
                <a href="https://www.instagram.com/tigaberlianofficial?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener noreferrer" class="cta-button">
                    ORDER NOW
                </a>
            </div>

            <div class="image-container">
                <img src="asset/WEBSITE UNDERCONSTRUCTION (2).png" alt="Background Construction Asset">
            </div>
        </main>
    </div>

    <script>
        // --- LOGIKA HAMBURGER MENU ---
        const hamburgerBtn = document.getElementById('hamburger-menu');
        const navbar = document.getElementById('navbar');

        hamburgerBtn.addEventListener('click', () => {
            // Toggle class 'active' untuk mengubah ikon garis tiga jadi X
            hamburgerBtn.classList.toggle('active');
            // Toggle class 'show' untuk memunculkan menu
            navbar.classList.toggle('show');
        });

        // --- LOGIKA EFEK MENGETIK ---
        window.addEventListener('DOMContentLoaded', () => {
            const textToType = "UNDERCONSTRUCTION";
            const targetElement = document.getElementById('typed-text');
            const speed = 150; 
            let i = 0;

            function typeWriter() {
                if (i < textToType.length) {
                    targetElement.innerHTML += textToType.charAt(i);
                    i++;
                    setTimeout(typeWriter, speed);
                }
            }
            
            setTimeout(typeWriter, 500); 
        });
    </script>
</body>
</html>
